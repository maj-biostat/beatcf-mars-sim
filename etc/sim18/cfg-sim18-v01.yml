default:
  desc: "Defer at NI Boundary"
  nsim: 500
  mc_cores: 40
  mcmc_warmup: 1000
  mcmc_iter: 1000
  mcmc_chain: 1
  # redraws for effect calculation
  mcmc_B: 1000
  
  # example trials
  nex: 5
  # enrolment
  N_pt: [400, 100, 100]
  pt_per_day: 1.2
  ramp_up_days: 60
  
  # administrative censor
  followup: 720
  followup_dec: 28
  visit_days: [0, 1, 2, 3, 4, 5, 6, 7, 14, 21, 28]
  
  
  state_lab: ["none", "mild", "severe"]
  # controls which trt can be allocated
  trt_active: [1, 1, 1]
  trt_lab: ["soc", "def", "dis"]
  
  p_init: [0, 0.4, 0.6]
  
  alpha: [-0.5, 1.2]
  
  # The time in state is calculated as a sum of the sops by day up to day 28.
  # However, we only observe a subset of the days so the model is recovering 
  # the sops at a subset of days. We scale the sops by the gap. This is 
  # probably a bit of a problem as it could lead to both under or over estimates.
  
  # 0.1418942 -0.4000009 -0.4000000 corresponds to an NI of 0.40
  # 0.1592559 -0.4499971 -0.4500000 corresponds to an NI of 0.45
  # 0.1765427 -0.5000003 -0.5000000 corresponds to an NI of 0.50
  # 0.1937544 -0.5498294 -0.5500000 corresponds to an NI of 0.55 
  # 0.2108871 -0.5999984 -0.6000000 corresponds to an NI of 0.60 
  # 0.2279478 -0.6499934 -0.6500000 corresponds to an NI of 0.65 
  # 0.3454595 -1.0000036 -1.0000000 corresponds to an NI of 1.0 
  b_trt: [0.0, 0.3454595, 0.0]   
  b_prev: [0.0, 2.0, 1.0]  # orig [0.0, 1.5, 0.1]
  b_time_1: -0.32  # orig -0.4
  b_time_2: 0.003  # orig 0.002
  # gap for 8-13, 15-20, 22-27
  b_gap: [0.0, 0.0, 0.0, 0.0]
  # b_trt_gap: [0.0, 0.0, 0.0]
  b_trt_time: [0.0, 0.0, 0.0]
  
  # decision reference values - think of these as the non-inferiority margins
  
  # will not tolerate expected total time in exacerbation to be more than 
  # NOTE - for type i error evaluation this has to align with a treatment 
  # effect that induces an appropriate change in sojourn times across trt.
  dec_delta_ni: 1.0
  
  # could equivalently say that we will not tolerate the same amount of days
  # less of health.
  
  # decision probability thresholds - 
  
  # level of certainty we require to make claims
  dec_thresh_ni: 0.985
  dec_thresh_fut: 0.80
    
